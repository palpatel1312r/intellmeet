<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelMeet - Smart Meeting Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            margin: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: transform 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            color: white;
        }
        .status {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <h1>🚀 IntelMeet</h1>
        <p>Smart Meeting Solutions for Modern Teams</p>
        <hr>
        <p>Our platform is currently being upgraded to serve you better!</p>
        <a href="#" class="btn-custom">Learn More</a>
        <a href="#" class="btn-custom" style="background: #6c757d;">Contact Us</a>
        <div class="status">
            <small>📧 For support: info@intelmeet.com</small><br>
            <small>🕒 Expected launch: Coming Soon</small>
        </div>
    </div>
</body>
</html>
